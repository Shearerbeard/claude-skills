StylesPath = .vale
MinAlertLevel = suggestion

Packages = https://github.com/tbhb/vale-ai-tells/releases/download/v1.13.1/ai-tells.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.13.1/ai-tells-commits.zip

[*.md]
BasedOnStyles = ai-tells, local
ai-tells.EmDashUsage = NO
# FormalRegister: package copy off; trimmed local override applies (see .vale/local/)
ai-tells.FormalRegister = NO

[formats]
COMMIT_EDITMSG = md

[{COMMIT_EDITMSG,.git/COMMIT_EDITMSG,**/COMMIT_EDITMSG}]
BasedOnStyles = ai-tells, ai-tells-commits, local
ai-tells.EmDashUsage = NO
ai-tells.FormalRegister = NO

# Skills are agent-facing instructions; prose quality is not enforced here.
[**/SKILL.md]
BasedOnStyles =

# This skill intentionally contains many bad-prose examples. For changes to its
# non-example prose, lint the changed snippet through prose-lint stdin mode.
[plugins/docs/skills/humanizer/**]
BasedOnStyles =
