StylesPath = .vale
MinAlertLevel = suggestion

Packages = https://github.com/tbhb/vale-ai-tells/releases/download/v1.13.1/ai-tells.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.13.1/ai-tells-commits.zip

[*.md]
BasedOnStyles = ai-tells

[COMMIT_EDITMSG]
BasedOnStyles = ai-tells, ai-tells-commits

[.git/COMMIT_EDITMSG]
BasedOnStyles = ai-tells, ai-tells-commits

# This skill intentionally contains many bad-prose examples. For changes to its
# non-example prose, lint the changed snippet through prose-lint stdin mode.
[plugins/docs/skills/humanizer/**]
BasedOnStyles =
