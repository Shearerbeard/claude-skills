StylesPath = .vale
MinAlertLevel = suggestion

Packages = https://github.com/tbhb/vale-ai-tells/releases/download/v1.13.1/ai-tells.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.13.1/ai-tells-commits.zip

[*.md]
BasedOnStyles = ai-tells, local
# FormalRegister: package copy off; trimmed local override applies (see .vale/local/)
ai-tells.FormalRegister = NO

[formats]
COMMIT_EDITMSG = md

[{COMMIT_EDITMSG,.git/COMMIT_EDITMSG}]
BasedOnStyles = ai-tells, ai-tells-commits, local
ai-tells.FormalRegister = NO
